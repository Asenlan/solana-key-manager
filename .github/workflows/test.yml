name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Run tests
        run: cargo test --release

      - name: Build release
        run: cargo build --release

      - name: Smoke test
        run: |
          ./target/release/solana-km --version
          ./target/release/solana-km --help
          # Generate ephemeral keypair (no disk write)
          ./target/release/solana-km generate --ephemeral 2>/dev/null
          echo "CLI smoke test passed"
